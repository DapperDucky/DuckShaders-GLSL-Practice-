<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Three.js Animated Shader</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
    </style>
</head>
<body>
    <!-- <script src="https://end3r.github.io/MDN-Games-3D/Shaders/js/three.min.js"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.144.0/build/three.min.js"></script>
    <script type="module">
        //import * as THREE from 'https://cdn.skypack.dev';

        const _VS = `
            void main() {
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const _FS = `
            uniform float uTime; // Time passed in seconds
            void main() {
                // Use a sine wave to oscillate between 0.0 and 1.0
                float transition = sin(uTime) * 0.5 + 0.5;
                
                vec3 colorWhite = vec3(1.0, 1.0, 1.0);
                vec3 colorRed = vec3(1.0, 0.0, 0.0);
                
                // Mix the colors based on our transition value
                vec3 finalColor = mix(colorWhite, colorRed, transition);
                
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 2;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Define the uniform object
        const uniforms = {
            uTime: { value: 0.0 }
        };

        const material = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: _VS,
            fragmentShader: _FS
        });

        const cube = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), material);
        scene.add(cube);

        const clock = new THREE.Clock(); // Use Clock to track elapsed time

        function animate() {
            requestAnimationFrame(animate);
            
            // Update the uniform value every frame
            material.uniforms.uTime.value = clock.getElapsedTime();
            
            cube.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
