<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>MDN Games: Shaders demo</title>
    <style>
      html, body, canvas {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }
      body {
        font-size: 0;
      }
      canvas {
        display: block;
      }

      #main {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: auto;
        grid-template-rows: auto;
      }

      #container {
        width: 100%;
        height: 100%;

        grid-column-start: 1;
        grid-column-end: 2;
        grid-row-start: 1;
        grid-row-end: 2;
      }

      #overlay {
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.0);

        grid-column-start: 1;
        grid-column-end: 2;
        grid-row-start: 1;
        grid-row-end: 2;
      }

    </style>
  </head>
  <body>
    <div id="main">
      <div id="container">

      </div>
      <div id="overlay">

      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/three@0.144.0/build/three.min.js"></script>
    <script id="vertexShader" type="x-shader/x-vertex">
      varying vec2 vUv;  
      
      void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position.x+0.0, position.y, position.z+0.0, 1.0);
        }
    </script>
    <script id="fragmentShader" type="x-shader/x-fragment">
      precision mediump float;
      varying vec2 vUv;
      uniform float iTime;  
      
      void main() {
          float r = cos(iTime + 4.0);
          float g = cos(iTime + 2.0);
          float b = cos(iTime + 0.0);
          gl_FragColor = vec4(1.0, 0.2, 0.2, 1.0);
      }
    </script>
    <script>
      const shaders = [];
      const clock = new THREE.Clock();
      const WIDTH = window.innerWidth;
      const HEIGHT = window.innerHeight;
      const pivot = new THREE.Group();
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(70, WIDTH / HEIGHT);
      const boxGeometry = new THREE.BoxGeometry(10, 10, 10);
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      let UPDATE_SHADER = false;
      let VERTEX_SHADER_CODE = null;
      let FRAGMENT_SHADER_CODE = null;
      let currentIndex = 0;
      renderer.setSize(WIDTH, HEIGHT);
      renderer.setClearColor(0xdddddd, 1);
      document.getElementById("container").appendChild(renderer.domElement);

      camera.position.z = 50;
      scene.add(camera);

      const myUniforms = {
        iTime: { value: 1.0 },
      };

      async function loadShader(path) {
        const text = await fetch(path).then(async (response) => {
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          var x = await response.text();
          return x;
        });
        return text;
      }

      async function getShaderCode(path) {
        var code = '';
        _ = await loadShader(path).then((t) => {
           code = t;
        });
        return code;
      }
      
      let vertexShaderCode = '';
      let vertexShaderNeedsUpdate = false;
      getShaderCode('./shaders/vertex_shader_000.glsl').then((code) => {
        vertexShaderCode = code;
        vertexShaderNeedsUpdate = true;
        VERTEX_SHADER_CODE = vertexShaderCode;
      });
      
      let fragmentShaderCode = '';
      let fragmentShaderNeedsUpdate = false;
      getShaderCode('./shaders/fragment_shader_000.glsl').then((code) => {
        fragmentShaderCode = code;
        fragmentShaderNeedsUpdate = true;
        FRAGMENT_SHADER_CODE = fragmentShaderCode;
      });
      
      let shaderMaterial = new THREE.ShaderMaterial({
        vertexShader: document.getElementById("vertexShader").textContent,
        fragmentShader: document.getElementById("fragmentShader").textContent,
        uniforms: myUniforms
      });
      
      const cube = new THREE.Mesh(boxGeometry, shaderMaterial);
      cube.translateX(0);
      cube.translateY(0);
      cube.translateZ(0);
      scene.add(cube);

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize( window.innerWidth, window.innerHeight );
      }

      document.addEventListener('keydown', function(event) {
        switch (event.key) {
          case 'ArrowLeft':
            GetNextShaders();
            break;
          case 'ArrowRight':
            GetNextShaders();
            break;
        }
      });

      window.addEventListener("resize", () => {
        onWindowResize();
      });

      async function fileExistsAsync(url) {
        try {
          const response = await fetch(url, { method: 'HEAD' });
          return response.ok; // Returns true if status is 200-399
        } catch (error) {
          return false;
        }
      }

      function fileExists(url) {
        const exist = async() => {
          const prom = await fileExistsAsync(url);
          const result = prom;
          return result;
        }  
        return exist();
      }

      async function LoadShaders() {
        let numberOfShaders = 0;
        let vsf = `./shaders/vertex_shader_${numberOfShaders.toString().padStart(3, '0')}.glsl`;
        let fsf = `./shaders/fragment_shader_${numberOfShaders.toString().padStart(3, '0')}.glsl`;

        while (await fileExists(vsf) && await fileExists(fsf) && numberOfShaders < 100) {
          let _vertexShaderCode = '';
          let _fragmentShaderCode = '';

          _vertexShaderCode = await getShaderCode(vsf);
          _fragmentShaderCode = await getShaderCode(fsf);

          shaders.push({
            vertex: _vertexShaderCode,
            fragment: _fragmentShaderCode
          });
          
          numberOfShaders = numberOfShaders + 1;
          vsf = `./shaders/vertex_shader_${numberOfShaders.toString().padStart(3, '0')}.glsl`;
          fsf = `./shaders/fragment_shader_${numberOfShaders.toString().padStart(3, '0')}.glsl`;
        }
        vertexShaderNeedsUpdate = true;
        fragmentShaderNeedsUpdate = true;
      }

      function GetNextShaders() {
        if (shaders.length > 0) {
          currentIndex = (currentIndex + 1) % shaders.length;
          let nextShader = shaders[currentIndex];
          VERTEX_SHADER_CODE = nextShader.vertex;
          FRAGMENT_SHADER_CODE = nextShader.fragment;
          UPDATE_SHADER = true;
        }
      }

      function Render() {
        if (UPDATE_SHADER) {
          shaderMaterial.vertexShader = VERTEX_SHADER_CODE;
          shaderMaterial.fragmentShader = FRAGMENT_SHADER_CODE;
          shaderMaterial.needsUpdate = true;
          UPDATE_SHADER = false;
        }
        
        shaderMaterial.fragmentShader
        const elapsedTime = clock.getElapsedTime();
        shaderMaterial.uniforms.iTime.value = performance.now() / 1000;
        cube.geometry.rotateY(0.01);
        
        requestAnimationFrame(Render);
        renderer.render(scene, camera);
      }
      
      LoadShaders();
      GetNextShaders();
      Render();
    </script>
  </body>
</html>
