<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>MDN Games: Shaders demo</title>
    <style>
      html, body, canvas {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }
      body {
        font-size: 0;
      }
      canvas {
        display: block;
      }

      

      #main {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: auto;
        grid-template-rows: auto;
      }

      #container {
        width: 100%;
        height: 100%;

        grid-column-start: 1;
        grid-column-end: 2;
        grid-row-start: 1;
        grid-row-end: 2;
      }

      #overlay {
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.0);

        grid-column-start: 1;
        grid-column-end: 2;
        grid-row-start: 1;
        grid-row-end: 2;
      }

    </style>
  </head>
  <body>
    <div id="main">
      <div id="container">

      </div>
      <div id="overlay">

      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/three@0.144.0/build/three.min.js"></script>
    <script id="vertexShader" type="x-shader/x-vertex">
      varying vec2 vUv;  
      
      void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position.x+10.0, position.y, position.z+5.0, 1.0);
        }
    </script>
    <script id="fragmentShader" type="x-shader/x-fragment">
      precision mediump float;
      varying vec2 vUv;
      uniform float iTime;  
      
      void main() {
          float r = cos(iTime + 4.0);
          float g = cos(iTime + 2.0);
          float b = cos(iTime + 0.0);
          gl_FragColor = vec4(r, g, b, 1.0);
      }
    </script>
    <script>
      const clock = new THREE.Clock();
      const WIDTH = window.innerWidth;
      const HEIGHT = window.innerHeight;

      const pivot = new THREE.Group();

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(WIDTH, HEIGHT);
      renderer.setClearColor(0xdddddd, 1);
      document.getElementById("container").appendChild(renderer.domElement);

      const scene = new THREE.Scene();

      const camera = new THREE.PerspectiveCamera(70, WIDTH / HEIGHT);
      camera.position.z = 50;
      scene.add(camera);

      const boxGeometry = new THREE.BoxGeometry(10, 10, 10);
      //boxGeometry.translate(-5, -5, -5); // Move the box forward along the z-axis

      // Center geometry faces
      //boxGeometry.center();
      //this.geometry.center();

      const myUniforms = {
        iTime: { value: 1.0 },
      };

      const shaderMaterial = new THREE.ShaderMaterial({
        vertexShader: document.getElementById("vertexShader").textContent,
        fragmentShader: document.getElementById("fragmentShader").textContent,
        uniforms: myUniforms
      });

      const cube = new THREE.Mesh(boxGeometry, shaderMaterial);
      cube.translateX(-10);
      cube.translateY(0);
      cube.translateZ(0);
      scene.add(cube);
      //cube.rotation.set(0.4, 0.2, 0);

      //pivot.add(cube);
      //scene.add(pivot); 

      function render() {
        const elapsedTime = clock.getElapsedTime();
        shaderMaterial.uniforms.iTime.value = performance.now() / 1000;
        //cube.rotation.x += 0.01;
        cube.geometry.rotateY(0.01);
        //cube.geometry.y += 0.01;

        requestAnimationFrame(render);
        renderer.render(scene, camera);
      }
      render();
    </script>
  </body>
</html>
