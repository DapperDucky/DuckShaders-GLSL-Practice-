<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>MDN Games: Shaders demo</title>
    <style>
      html, body, canvas {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }
      body {
        font-size: 0;
      }
      canvas {
        display: block;
      }

      #main {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: auto;
        grid-template-rows: auto;
      }

      #container {
        width: 100%;
        height: 100%;

        grid-column-start: 1;
        grid-column-end: 2;
        grid-row-start: 1;
        grid-row-end: 2;
      }

      #overlay {
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.0);

        grid-column-start: 1;
        grid-column-end: 2;
        grid-row-start: 1;
        grid-row-end: 2;
      }

    </style>
  </head>
  <body>
    <div id="main">
      <div id="container">

      </div>
      <div id="overlay">

      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/three@0.144.0/build/three.min.js"></script>
    <script id="vertexShader" type="x-shader/x-vertex">
      varying vec2 vUv;  
      
      void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position.x+0.0, position.y, position.z+0.0, 1.0);
        }
    </script>
    <script id="fragmentShader" type="x-shader/x-fragment">
      precision mediump float;
      varying vec2 vUv;
      uniform float iTime;  
      
      void main() {
          float r = cos(iTime + 4.0);
          float g = cos(iTime + 2.0);
          float b = cos(iTime + 0.0);
          gl_FragColor = vec4(1.0, 0.2, 0.2, 1.0);
      }
    </script>
    <script>
      const clock = new THREE.Clock();
      const WIDTH = window.innerWidth;
      const HEIGHT = window.innerHeight;
      const pivot = new THREE.Group();
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(70, WIDTH / HEIGHT);
      const boxGeometry = new THREE.BoxGeometry(10, 10, 10);
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(WIDTH, HEIGHT);
      renderer.setClearColor(0xdddddd, 1);
      document.getElementById("container").appendChild(renderer.domElement);

      camera.position.z = 50;
      scene.add(camera);

      const myUniforms = {
        iTime: { value: 1.0 },
      };

      async function loadShader(path) {
        const text = await fetch(path).then(async (response) => {
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          var x = await response.text();
          console.log('Taco 1');
          return x;
        });
        return text;
      }

      async function getShaderCode(path) {
        var code = '';
        _ = await loadShader(path).then((t) => {
           code = t;
        });
        return code;
      }
      
      let vertexShaderCode = '';
      let vertexShaderNeedsUpdate = false;
      getShaderCode('./shaders/vertex_shader_001.glsl').then((code) => {
        vertexShaderCode = code;
        vertexShaderNeedsUpdate = true;
      });
      
      let fragmentShaderCode = '';
      let fragmentShaderNeedsUpdate = false;
      getShaderCode('./shaders/fragment_shader_001.glsl').then((code) => {
        fragmentShaderCode = code;
        fragmentShaderNeedsUpdate = true;
      });
      
      let shaderMaterial = new THREE.ShaderMaterial({
        vertexShader: document.getElementById("vertexShader").textContent,
        fragmentShader: document.getElementById("fragmentShader").textContent,
        //vertexShader: vertexShaderCode,
        //fragmentShader: fragmentShaderCode,
        uniforms: myUniforms
      });
      
      const cube = new THREE.Mesh(boxGeometry, shaderMaterial);
      cube.translateX(0);
      cube.translateY(0);
      cube.translateZ(0);
      scene.add(cube);

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize( window.innerWidth, window.innerHeight );
      }

      window.addEventListener("resize", () => {
        onWindowResize();
      });

      function render() {
        if (fragmentShaderNeedsUpdate && vertexShaderNeedsUpdate) {
          shaderMaterial.vertexShader = vertexShaderCode;
          shaderMaterial.fragmentShader = fragmentShaderCode;
          shaderMaterial.needsUpdate = true;
          fragmentShaderNeedsUpdate = false;
          vertexShaderNeedsUpdate = false;
        }

        shaderMaterial.fragmentShader
        const elapsedTime = clock.getElapsedTime();
        shaderMaterial.uniforms.iTime.value = performance.now() / 1000;
        cube.geometry.rotateY(0.01);

        requestAnimationFrame(render);
        renderer.render(scene, camera);
      }
      render();
    </script>
  </body>
</html>
